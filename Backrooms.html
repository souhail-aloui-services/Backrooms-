<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Backrooms 3D</title>
<style>
  body { margin: 0; overflow: hidden; background: #e5d69a; }
  #info {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    color: white;
    font-family: Arial;
    font-size: 20px;
    text-shadow: 2px 2px 4px #000;
  }
</style>
<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
</head>
<body>
<div id="info">W A S D للتنقل | الماوس للنظر</div>

<script type="module">
import * as THREE from 'three';

// 1. المشهد والكاميرا
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe5d69a);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.y = 1.6; // طول الإنسان

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 2. الضو ديال النيون
const light = new THREE.PointLight(0xffffaa, 1, 50);
light.position.set(0, 3, 0);
scene.add(light);
const ambient = new THREE.AmbientLight(0xe5d69a, 0.5);
scene.add(ambient);

// 3. الأرضية والجدار
const floorMat = new THREE.MeshStandardMaterial({color: 0xe5d69a});
const floor = new THREE.Mesh(new THREE.PlaneGeometry(50,50), floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

const wallMat = new THREE.MeshStandardMaterial({color: 0xe5d69a});
for(let i=0; i<4; i++){
  const wall = new THREE.Mesh(new THREE.PlaneGeometry(50,10), wallMat);
  wall.position.y = 5;
  if(i==0) wall.position.z = -25;
  if(i==1) {wall.position.z = 25; wall.rotation.y = Math.PI;}
  if(i==2) {wall.position.x = -25; wall.rotation.y = Math.PI/2;}
  if(i==3) {wall.position.x = 25; wall.rotation.y = -Math.PI/2;}
  scene.add(wall);
}

// 4. التحكم
const keys = {};
document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

let yaw = 0;
document.addEventListener('mousemove', e => {
  yaw -= e.movementX * 0.002;
});

function animate(){
  requestAnimationFrame(animate);
  
  const speed = 0.1;
  if(keys['w']) camera.position.z -= speed * Math.cos(yaw);
  if(keys['s']) camera.position.z += speed * Math.cos(yaw);
  if(keys['a']) camera.position.x -= speed * Math.sin(yaw);
  if(keys['d']) camera.position.x += speed * Math.sin(yaw);
  
  camera.rotation.y = yaw;
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
