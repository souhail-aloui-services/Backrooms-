<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Backrooms Maze Horror v4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body{margin:0;overflow:hidden;background:#000;touch-action:none}
#info{position:absolute;top:10px;width:100%;text-align:center;color:#ffdd88;font-family:Arial;font-size:18px;font-weight:bold;text-shadow:0 0 5px #000}
#warning{display:none;position:absolute;top:35%;width:100%;text-align:center;color:#ff0000;font-size:36px;font-family:Arial;font-weight:bold;text-shadow:0 0 15px #ff0000;animation:blink 0.2s infinite}
@keyframes blink{50%{opacity:0}}
.btn{position:absolute;bottom:40px;width:70px;height:70px;font-size:30px;background:rgba(255,50,50,0.3);border:2px solid #ff0000;border-radius:15px;color:white;touch-action:none;user-select:none;transition:0.2s;box-shadow:0 0 10px rgba(255,0,0,0.5)}
.btn:active{background:rgba(255,0,0,0.7);transform:scale(0.9)}
#up{bottom:120px;left:15%}
#down{bottom:40px;left:15%}
#left{bottom:40px;left:calc(15% - 80px)}
#right{bottom:40px;left:calc(15% + 80px)}
#restart{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:25px 50px;font-size:28px;background:#ff0000;color:#fff;border:3px solid #fff;border-radius:15px;z-index:10;cursor:pointer}

/* جديد: الشخصية كاملة */
#player-body {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 350px;
  height: 500px;
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 500"><circle cx="175" cy="60" r="40" fill="%23e0b48d"/><path d="M155 90 L195 90 L190 200 L160 200 Z" fill="%23333"/><path d="M160 200 L140 350 L155 350 L170 220 Z" fill="%23111"/><path d="M190 200 L210 350 L195 350 L180 220 Z" fill="%23111"/><path d="M155 95 Q140 130 120 160 Q110 170 115 180 L130 175" fill="%23e0b48d"/><path d="M195 95 Q210 130 230 160 Q240 170 235 180 L220 175" fill="%23e0b48d"/></svg>') no-repeat center;
  background-size: contain;
  z-index: 999;
  pointer-events: none;
  opacity: 0.85;
  filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
  transition: transform 0.1s;
}
.running #player-body { animation: runBody 0.3s infinite; }
@keyframes runBody {
 0% { transform: translateX(-50%) translateY(0); }
 50% { transform: translateX(-50%) translateY(-10px); }
}

/* جديد: وضع افقي */
@media screen and (orientation: landscape) {
.btn { transform: scale(1.2); }
  #player-body { width: 450px; height: 600px; }
}
</style>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
</head>
<body>
<div id="info">متاهة Backrooms - هرب من الوحش!</div>
<div id="warning">⚠️ الوحش قريب!! ⚠️</div>

<!-- جديد: الشخصية كاملة -->
<div id="player-body"></div>

<button class="btn" id="up">▲</button>
<button class="btn" id="left">◀</button>
<button class="btn" id="down">▼</button>
<button class="btn" id="right">▶</button>
<button id="restart">🔄 إعادة التشغيل</button>

<script type="module">
import * as THREE from 'three';
let scene,camera,renderer,monster,gameOver=false;
let yaw=0,pitch=0;
const walls=[];
let beepInterval = null;

function playBeep(speed){
  if(beepInterval) clearInterval(beepInterval);
  beepInterval = setInterval(()=>{
    try{
      const audio = new AudioContext();
      const osc = audio.createOscillator();
      osc.frequency.value = 900;
      osc.connect(audio.destination);
      osc.start(); osc.stop(audio.currentTime + 0.08);
    }catch(e){}
  }, speed);
}
function stopBeep(){ if(beepInterval) clearInterval(beepInterval); beepInterval = null; }

function makeScaryTexture(text, isScary){
  const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
  canvas.width=512; canvas.height=512;
  ctx.fillStyle='#554400'; ctx.fillRect(0,0,512,512);
  
  if(isScary){
    // خربشات و دم
    ctx.strokeStyle='#880000'; ctx.lineWidth=8;
    for(let i=0;i<20;i++){
      ctx.beginPath();
      ctx.moveTo(Math.random()*512, Math.random()*512);
      ctx.lineTo(Math.random()*512, Math.random()*512);
      ctx.stroke();
    }
    // عيون مخيفة
    ctx.fillStyle='#ff0000';
    for(let i=0;i<5;i++){
      ctx.beginPath();
      ctx.arc(Math.random()*512, Math.random()*512, 15, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle='#aa0000'; ctx.font='bold 40px Arial'; 
    ctx.fillText('HELP ME', 150, 250);
    ctx.fillText('RUN', 200, 300);
  } else {
    // الجدار الاول ديالك
    ctx.fillStyle='#bb0000'; ctx.font='bold 50px Arial'; ctx.textAlign='center'; 
    ctx.fillText('Sohail alaoui 🍁',256,256);
  }
  return new THREE.CanvasTexture(canvas);
}

function initGame(){
  document.body.querySelectorAll('canvas').forEach(c=>c.remove());
  stopBeep();
  gameOver=false;
  document.getElementById('restart').style.display='none';
  document.getElementById('warning').style.display='none';
  document.getElementById('info').innerText='متاهة Backrooms - هرب من الوحش!';

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x1a1400);
  scene.fog=new THREE.Fog(0x1a1400,5,25); // ضباب اكثر رعب

  camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  // اضاءة مخيفة
  scene.add(new THREE.AmbientLight(0x442200,0.5));
  const light1=new THREE.PointLight(0xffaa00,3,30);light1.position.set(0,4,0);scene.add(light1);
  const light2=new THREE.PointLight(0xffaa00,2,20);light2.position.set(15,4,25);scene.add(light2);

  const floor=new THREE.Mesh(new THREE.PlaneGeometry(300,300),new THREE.MeshStandardMaterial({color:0x443300, roughness:0.9}));
  floor.rotation.x=-Math.PI/2;scene.add(floor);

  walls.length=0;
  function addWall(x,z,w,h, isFirst){
    const tex = makeScaryTexture('',!isFirst);
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,5,h), new THREE.MeshStandardMaterial({map: tex}));
    m.position.set(x,2.5,z);scene.add(m);walls.push(m);
  }

  // الجدار الاول فقط فيه اسمك
  addWall(0,-8,10,1, true); 
  addWall(-5,0,1,30, false); addWall(5,0,1,30, false);
  addWall(15,5,10,1, false); addWall(20,-5,1,20, false); addWall(20,15,1,20, false);
  addWall(10,15,10,1, false); addWall(10,-5,10,1, false);
  addWall(-15,5,10,1, false); addWall(-20,-5,1,20, false); addWall(-20,15,1,20, false);
  addWall(-10,15,10,1, false); addWall(-10,-5,10,1, false);
  addWall(0,20,10,1, false); addWall(-5,35,1,30, false); addWall(5,35,1,30, false);
  addWall(15,35,10,1, false); addWall(20,25,1,20, false); addWall(20,45,1,20, false);
  addWall(-15,35,10,1, false); addWall(-20,25,1,20, false); addWall(-20,45,1,20, false);
  addWall(0,55,10,1, false);

  monster=new THREE.Mesh(
    new THREE.SphereGeometry(1.8,16,16),
    new THREE.MeshStandardMaterial({color:0x000, emissive:0xff0000, emissiveIntensity:3})
  );
  monster.position.set(0,1,45);
  scene.add(monster);
  const monsterLight = new THREE.PointLight(0xff0000,6,20); monster.add(monsterLight);

  camera.position.set(0,1.7,2);
  yaw=0; pitch=0;
  animate();
}

let move={u:0,d:0,l:0,r:0};
['up','down','left','right'].forEach((k,i)=>{
  const btn=document.getElementById(k);
  const key=['u','d','l','r'][i];
  const start=()=>{move[key]=1; document.body.classList.add('running');}
  const end=()=>{move[key]=0; if(!move.u &&!move.d &&!move.l &&!move.r){document.body.classList.remove('running');}}
  btn.addEventListener('touchstart',e=>{e.preventDefault();start()});
  btn.addEventListener('touchend',e=>{e.preventDefault();end()});
  btn.addEventListener('touchcancel',e=>{e.preventDefault();end()});
});

let isDragging=false, lastX=0, lastY=0;
document.addEventListener('touchstart',e=>{
  if(e.touches.length===1 &&!e.target.classList.contains('btn') && e.target.id!=='restart'){
    isDragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }
});
document.addEventListener('touchmove',e=>{
  if(isDragging){
    const dx=e.touches[0].clientX-lastX; const dy=e.touches[0].clientY-lastY;
    yaw -= dx*0.012; pitch -= dy*0.012;
    pitch = Math.max(-1.5, Math.min(1.5, pitch));
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }
});
document.addEventListener('touchend',()=>{isDragging=false});

document.getElementById('restart').onclick=()=>{initGame()};

function animate(){
  if(gameOver) return;
  requestAnimationFrame(animate);
  const speed=0.14;

  const forward = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const right = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const newPos=camera.position.clone();
  if(move.u) newPos.addScaledVector(forward, speed);
  if(move.d) newPos.addScaledVector(forward, -speed);
  if(move.l) newPos.addScaledVector(right, -speed);
  if(move.r) newPos.addScaledVector(right, speed);

  let collision=false;
  walls.forEach(w=>{if(new THREE.Box3().setFromObject(w).containsPoint(newPos))collision=true;});
  if(!collision)camera.position.copy(newPos);

  const dir = camera.position.clone().sub(monster.position).normalize();
  monster.position.addScaledVector(dir, 0.08);
  monster.lookAt(camera.position);

  const dist = monster.position.distanceTo(camera.position);
  const warning = document.getElementById('warning');

  if(dist < 12){
    warning.style.display='block';
    if(dist < 6) playBeep(200); else playBeep(600);
  } else {
    warning.style.display='none';
    stopBeep();
  }

  if(dist<2.3){
    document.getElementById('info').innerText='الوحش مسك!!';
    document.getElementById('restart').style.display='block';
    warning.style.display='none';
    stopBeep();
    document.body.classList.remove('running');
    gameOver=true;
  }

  camera.rotation.set(pitch, yaw, 0, 'YXZ');
  renderer.render(scene,camera);
}

initGame();
</script>
</body>
</html>
