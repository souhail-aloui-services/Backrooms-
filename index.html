<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Backrooms Game</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  #info {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    color: white;
    font-family: Arial;
    font-size: 16px;
    text-shadow: 2px 2px 4px #000;
    z-index: 10;
  }
  #joystick {
    position: absolute;
    bottom: 50px;
    left: 50px;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    z-index: 10;
  }
</style>
<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="info">W A S D أو الجويستيك للتنقل | اسحب للنظر</div>
<div id="joystick"></div>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe5d69a);
scene.fog = new THREE.Fog(0xe5d69a, 10, 50);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// الضو
scene.add(new THREE.AmbientLight(0xe5d69a, 0.7));
const light = new THREE.PointLight(0xffffaa, 2, 30);
light.position.set(0, 4, 0);
scene.add(light);

// الأرضية بمربعات
const texture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/checker.png');
texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
texture.repeat.set(20,20);
const floor = new THREE.Mesh(new THREE.PlaneGeometry(200,200), new THREE.MeshStandardMaterial({map: texture}));
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// متاهة ديال الجدران
const walls = [];
const wallMat = new THREE.MeshStandardMaterial({color: 0xe5d69a});
function addWall(x,z,w,h){
  const wall = new THREE.Mesh(new THREE.BoxGeometry(w, 5, h), wallMat);
  wall.position.set(x, 2.5, z);
  scene.add(wall);
  walls.push(wall);
}

// صايب غرف و ممرات
addWall(0, -20, 40, 1); // غرفة 1
addWall(-20, 0, 1, 40);
addWall(20, 0, 1, 40);
addWall(0, 20, 40, 1);

addWall(0, 0, 1, 15); // باب
addWall(0, 30, 40, 1); // غرفة 2
addWall(-20, 30, 1, 20);
addWall(20, 30, 1, 20);
addWall(0, 50, 40, 1);

const controls = new PointerLockControls(camera, document.body);
document.addEventListener('click', () => controls.lock());
camera.position.set(0, 1.6, 10);

const keys = {};
document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// منع الإختراق ديال الجدران
function checkCollision(newPos){
  for(let wall of walls){
    const box = new THREE.Box3().setFromObject(wall);
    if(box.containsPoint(newPos)) return true;
  }
  return false;
}

function animate(){
  requestAnimationFrame(animate);
  
  const speed = 0.15;
  const newPos = camera.position.clone();
  
  if(keys['w']) newPos.z -= speed;
  if(keys['s']) newPos.z += speed;
  if(keys['a']) newPos.x -= speed;
  if(keys['d']) newPos.x += speed;
  
  if(!checkCollision(newPos)) camera.position.copy(newPos);
  
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
