<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Backrooms Level 0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body{margin:0;overflow:hidden;background:#000;touch-action:none;filter: contrast(1.1) brightness(0.9)}
#info{position:absolute;top:10px;width:100%;text-align:center;color:#ffffaa;font-family:Arial;font-size:18px;font-weight:bold;text-shadow:0 0 5px #000}
#warning{display:none;position:absolute;top:35%;width:100%;text-align:center;color:#ff0000;font-size:36px;font-family:Arial;font-weight:bold;text-shadow:0 0 15px #ff0000;animation:blink 0.2s infinite}
@keyframes blink{50%{opacity:0}}
.btn{position:absolute;bottom:40px;width:70px;height:70px;font-size:30px;background:rgba(255,255,0,0.15);border:2px solid #ffff00;border-radius:15px;color:white;touch-action:none;user-select:none}
.btn:active{background:rgba(255,255,0,0.4)}
#up{bottom:120px;left:15%}
#down{bottom:40px;left:15%}
#left{bottom:40px;left:calc(15% - 80px)}
#right{bottom:40px;left:calc(15% + 80px)}
#restart{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:25px 50px;font-size:28px;background:#ff0000;color:#fff;border:3px solid #fff;border-radius:15px;z-index:10;cursor:pointer}

/* الشخصية 3D من الجنب بحال الصورة */
#player-model {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 400px;
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400"><rect x="80" y="50" width="40" height="40" fill="%23fdbcb4"/><rect x="70" y="90" width="60" height="80" fill="%23ffffff"/><rect x="75" y="170" width="20" height="100" fill="%23222"/><rect x="105" y="170" width="20" height="100" fill="%23222"/><rect x="60" y="95" width="15" height="60" fill="%23ffffff"/><rect x="125" y="95" width="15" height="60" fill="%23ffffff"/></svg>') no-repeat center;
  background-size: contain;
  z-index: 999;
  pointer-events: none;
  image-rendering: pixelated; /* ستايل بكسل بحال الصورة */
}
.running #player-model { animation: runPlayer 0.4s infinite; }
@keyframes runPlayer {
 0% { transform: translateX(-50%) rotate(-3deg); }
 50% { transform: translateX(-50%) rotate(3deg); }
}

@media screen and (orientation: landscape) {
.btn { transform: scale(1.2); }
  #player-model { width: 250px; height: 450px; }
}
</style>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
</head>
<body>
<div id="info">Backrooms Level 0 - هرب!</div>
<div id="warning">⚠️ ENTITY قريب!! ⚠️</div>

<div id="player-model"></div>

<button class="btn" id="up">▲</button>
<button class="btn" id="left">◀</button>
<button class="btn" id="down">▼</button>
<button class="btn" id="right">▶</button>
<button id="restart">🔄 إعادة التشغيل</button>

<script type="module">
import * as THREE from 'three';
let scene,camera,renderer,monster,gameOver=false;
let yaw=0,pitch=0;
const walls=[];
let beepInterval = null;

function playBeep(speed){
  if(beepInterval) clearInterval(beepInterval);
  beepInterval = setInterval(()=>{
    try{
      const audio = new AudioContext();
      const osc = audio.createOscillator();
      osc.frequency.value = 400; // صوت اخفض و اخوف
      osc.connect(audio.destination);
      osc.start(); osc.stop(audio.currentTime + 0.1);
    }catch(e){}
  }, speed);
}
function stopBeep(){ if(beepInterval) clearInterval(beepInterval); beepInterval = null; }

function makeBackroomsTexture(isFirstWall){
  const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
  canvas.width=512; canvas.height=512;
  
  // لون Backrooms الاصفر الكلاسيكي
  ctx.fillStyle='#d4c45a'; 
  ctx.fillRect(0,0,512,512);
  
  // ورق الحائط بنقشة
  ctx.strokeStyle='#b8a84a'; ctx.lineWidth=1;
  for(let i=0;i<512;i+=32){
    ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,512); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(512,i); ctx.stroke();
  }
  
  if(isFirstWall){
    ctx.fillStyle='#8b0000'; ctx.font='bold 40px Arial'; ctx.textAlign='center'; 
    ctx.fillText('Sohail alaoui 🍁',256,256);
  } else {
    // خربشات و كتابة مخيفة
    ctx.strokeStyle='#660000'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(50,100); ctx.lineTo(200,150); ctx.lineTo(100,300); ctx.stroke();
    ctx.fillStyle='#550000'; ctx.font='bold 30px Arial'; 
    ctx.fillText('GET OUT', 150, 400);
    ctx.fillText('NO EXIT', 300, 200);
  }
  return new THREE.CanvasTexture(canvas);
}

function makeFloorTexture(){
  const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
  canvas.width=512; canvas.height=512;
  ctx.fillStyle='#c4b45a'; ctx.fillRect(0,0,512,512);
  // سجاد Backrooms
  for(let i=0;i<512;i+=8){
    ctx.fillStyle = i%16===0? '#b8a84a' : '#d4c45a';
    ctx.fillRect(0,i,512,8);
  }
  return new THREE.CanvasTexture(canvas);
}

function makeCeilingTexture(){
  const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
  canvas.width=512; canvas.height=512;
  ctx.fillStyle='#e0d86a'; ctx.fillRect(0,0,512,512);
  // بلاط السقف + نيون
  for(let i=0;i<512;i+=64){
    ctx.strokeStyle='#999'; ctx.lineWidth=2;
    ctx.strokeRect(i,0,64,64);
    if(i%128===0) {
      ctx.fillStyle='#ffffaa';
      ctx.fillRect(i+8,8,48,48); // ضو النيون
    }
  }
  return new THREE.CanvasTexture(canvas);
}

function initGame(){
  document.body.querySelectorAll('canvas').forEach(c=>c.remove());
  stopBeep();
  gameOver=false;
  document.getElementById('restart').style.display='none';
  document.getElementById('warning').style.display='none';
  document.getElementById('info').innerText='Backrooms Level 0 - هرب!';

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0xd4c45a);
  scene.fog=new THREE.Fog(0xd4c45a,10,40);

  camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  // اضاءة النيون ديال Backrooms
  scene.add(new THREE.AmbientLight(0xffffcc,0.8));
  const light1=new THREE.PointLight(0xffffdd,4,50);light1.position.set(0,4,0);scene.add(light1);

  const floorTex = makeFloorTexture();
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(300,300),new THREE.MeshStandardMaterial({map:floorTex}));
  floor.rotation.x=-Math.PI/2;scene.add(floor);

  const ceilTex = makeCeilingTexture();
  const ceiling=new THREE.Mesh(new THREE.PlaneGeometry(300,300),new THREE.MeshStandardMaterial({map:ceilTex, emissive:0xffffaa, emissiveIntensity:0.3}));
  ceiling.rotation.x=Math.PI/2; ceiling.position.y=5; scene.add(ceiling);

  walls.length=0;
  function addWall(x,z,w,h, isFirst){
    const tex = makeBackroomsTexture(isFirst);
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,5,h), new THREE.MeshStandardMaterial({map: tex}));
    m.position.set(x,2.5,z);scene.add(m);walls.push(m);
  }

  addWall(0,-8,10,1, true); 
  addWall(-5,0,1,30, false); addWall(5,0,1,30, false);
  addWall(15,5,10,1, false); addWall(20,-5,1,20, false); addWall(20,15,1,20, false);
  addWall(10,15,10,1, false); addWall(10,-5,10,1, false);
  addWall(-15,5,10,1, false); addWall(-20,-5,1,20, false); addWall(-20,15,1,20, false);
  addWall(-10,15,10,1, false); addWall(-10,-5,10,1, false);
  addWall(0,20,10,1, false); addWall(-5,35,1,30, false); addWall(5,35,1,30, false);
  addWall(15,35,10,1, false); addWall(20,25,1,20, false); addWall(20,45,1,20, false);
  addWall(-15,35,10,1, false); addWall(-20,25,1,20, false); addWall(-20,45,1,20, false);
  addWall(0,55,10,1, false);

  // الوحش ENTITY
  monster=new THREE.Mesh(
    new THREE.SphereGeometry(1.8,16,16),
    new THREE.MeshStandardMaterial({color:0x111, emissive:0xff0000, emissiveIntensity:2})
  );
  monster.position.set(0,1,45);
  scene.add(monster);
  const monsterLight = new THREE.PointLight(0xff0000,5,15); monster.add(monsterLight);

  camera.position.set(0,1.7,2);
  yaw=0; pitch=0;
  animate();
}

let move={u:0,d:0,l:0,r:0};
['up','down','left','right'].forEach((k,i)=>{
  const btn=document.getElementById(k);
  const key=['u','d','l','r'][i];
  const start=()=>{move[key]=1; document.body.classList.add('running');}
  const end=()=>{move[key]=0; if(!move.u &&!move.d &&!move.l &&!move.r){document.body.classList.remove('running');}}
  btn.addEventListener('touchstart',e=>{e.preventDefault();start()});
  btn.addEventListener('touchend',e=>{e.preventDefault();end()});
  btn.addEventListener('touchcancel',e=>{e.preventDefault();end()});
});

let isDragging=false, lastX=0, lastY=0;
document.addEventListener('touchstart',e=>{
  if(e.touches.length===1 &&!e.target.classList.contains('btn') && e.target.id!=='restart'){
    isDragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }
});
document.addEventListener('touchmove',e=>{
  if(isDragging){
    const dx=e.touches[0].clientX-lastX; const dy=e.touches[0].clientY-lastY;
    yaw -= dx*0.012; pitch -= dy*0.012;
    pitch = Math.max(-1.5, Math.min(1.5, pitch));
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }
});
document.addEventListener('touchend',()=>{isDragging=false});

document.getElementById('restart').onclick=()=>{initGame()};

function animate(){
  if(gameOver) return;
  requestAnimationFrame(animate);
  const speed=0.14;

  const forward = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const right = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const newPos=camera.position.clone();
  if(move.u) newPos.addScaledVector(forward, speed);
  if(move.d) newPos.addScaledVector(forward, -speed);
  if(move.l) newPos.addScaledVector(right, -speed);
  if(move.r) newPos.addScaledVector(right, speed);

  let collision=false;
  walls.forEach(w=>{if(new THREE.Box3().setFromObject(w).containsPoint(newPos))collision=true;});
  if(!collision)camera.position.copy(newPos);

  const dir = camera.position.clone().sub(monster.position).normalize();
  monster.position.addScaledVector(dir, 0.08);
  monster.lookAt(camera.position);

  const dist = monster.position.distanceTo(camera.position);
  const warning = document.getElementById('warning');

  if(dist < 12){
    warning.style.display='block';
    if(dist < 6) playBeep(200); else playBeep(600);
  } else {
    warning.style.display='none';
    stopBeep();
  }

  if(dist<2.3){
    document.getElementById('info').innerText='ENTITY مسكك!!';
    document.getElementById('restart').style.display='block';
    warning.style.display='none';
    stopBeep();
    document.body.classList.remove('running');
    gameOver=true;
  }

  camera.rotation.set(pitch, yaw, 0, 'YXZ');
  renderer.render(scene,camera);
}

initGame();
</script>
</body>
</html>
