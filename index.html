<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Backrooms Maze Horror</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body{margin:0;overflow:hidden;background:#000;touch-action:none}
#info{position:absolute;top:10px;width:100%;text-align:center;color:#ffdd88;font-family:Arial;font-size:18px;font-weight:bold;text-shadow:0 0 5px #000}
#warning{display:none;position:absolute;top:35%;width:100%;text-align:center;color:#ff0000;font-size:36px;font-family:Arial;font-weight:bold;text-shadow:0 0 15px #ff0000;animation:blink 0.2s infinite}
@keyframes blink{50%{opacity:0}}
.btn{position:absolute;bottom:80px;width:70px;height:70px;font-size:30px;background:rgba(255,200,0,0.2);border:2px solid #ffcc00;border-radius:15px;color:white;touch-action:none;user-select:none}
.btn:active{background:rgba(255,200,0,0.6)}
#up{bottom:160px;left:50%;transform:translateX(-50%)}
#down{bottom:80px;left:50%;transform:translateX(-50%)}
#left{bottom:80px;left:15%}
#right{bottom:80px;right:15%}
#restart{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:25px 50px;font-size:28px;background:#ff0000;color:#fff;border:3px solid #fff;border-radius:15px;z-index:10;cursor:pointer}
</style>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
</head>
<body>
<div id="info">متاهة Backrooms - هرب من الوحش!</div>
<div id="warning">⚠️ الوحش قريب!! ⚠️</div>
<button class="btn" id="up">▲</button>
<button class="btn" id="left">◀</button>
<button class="btn" id="down">▼</button>
<button class="btn" id="right">▶</button>
<button id="restart">🔄 إعادة التشغيل</button>

<script type="module">
import * as THREE from 'three';
let scene,camera,renderer,monster,gameOver=false;
let yaw=0,pitch=0;
const walls=[];
let beepInterval = null;

function playBeep(speed){
  if(beepInterval) clearInterval(beepInterval);
  beepInterval = setInterval(()=>{
    try{
      const audio = new AudioContext();
      const osc = audio.createOscillator();
      osc.frequency.value = 900;
      osc.connect(audio.destination);
      osc.start(); osc.stop(audio.currentTime + 0.08);
    }catch(e){}
  }, speed);
}
function stopBeep(){ if(beepInterval) clearInterval(beepInterval); beepInterval = null; }

function initGame(){
  document.body.querySelectorAll('canvas').forEach(c=>c.remove());
  stopBeep();
  gameOver=false;
  document.getElementById('restart').style.display='none';
  document.getElementById('warning').style.display='none';
  document.getElementById('info').innerText='متاهة Backrooms - هرب من الوحش!';

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x332a00);
  scene.fog=new THREE.Fog(0x332a00,8,35);

  camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0x887700,1));
  const light1=new THREE.PointLight(0xffee66,4,40);light1.position.set(0,4,0);scene.add(light1);
  const light2=new THREE.PointLight(0xffee66,3,30);light2.position.set(15,4,25);scene.add(light2);
  const light3=new THREE.PointLight(0xffee66,3,30);light3.position.set(-15,4,45);scene.add(light3);

  const floor=new THREE.Mesh(new THREE.PlaneGeometry(300,300),new THREE.MeshStandardMaterial({color:0x665500}));
  floor.rotation.x=-Math.PI/2;scene.add(floor);

  function makeTextTexture(text){
    const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
    canvas.width=512; canvas.height=128;
    ctx.fillStyle='#554400'; ctx.fillRect(0,0,512,128);
    ctx.fillStyle='#bb0000'; ctx.font='bold 60px Arial'; ctx.textAlign='center'; ctx.fillText(text,256,80);
    for(let i=0;i<10;i++){ctx.beginPath();ctx.arc(Math.random()*512,Math.random()*128,Math.random()*15,0,Math.PI*2);ctx.fill();}
    return new THREE.CanvasTexture(canvas);
  }
  const textTex = makeTextTexture('souhail alaoui');
  const textMat = new THREE.MeshStandardMaterial({map: textTex});

  walls.length=0;
  function addWall(x,z,w,h){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,5,h),textMat);
    m.position.set(x,2.5,z);scene.add(m);walls.push(m);
  }

  // **متاهة كبيرة - 3 طرق + تفرعات**
  // الممر الرئيسي
  addWall(0,-8,10,1); addWall(-5,0,1,30); addWall(5,0,1,30);

  // تفرع يمين
  addWall(15,5,10,1); addWall(20,-5,1,20); addWall(20,15,1,20);
  addWall(10,15,10,1); addWall(10,-5,10,1);

  // تفرع يسار
  addWall(-15,5,10,1); addWall(-20,-5,1,20); addWall(-20,15,1,20);
  addWall(-10,15,10,1); addWall(-10,-5,10,1);

  // الممر الثاني
  addWall(0,20,10,1); addWall(-5,35,1,30); addWall(5,35,1,30);

  // تفرعات الممر الثاني
  addWall(15,35,10,1); addWall(20,25,1,20); addWall(20,45,1,20);
  addWall(-15,35,10,1); addWall(-20,25,1,20); addWall(-20,45,1,20);

  // النهاية
  addWall(0,55,10,1);

  // **الوحش**
  monster=new THREE.Mesh(
    new THREE.SphereGeometry(1.8,16,16),
    new THREE.MeshStandardMaterial({color:0x000, emissive:0xff0000, emissiveIntensity:2})
  );
  monster.position.set(0,1,30); // بعيد باش يعطيك وقت
  scene.add(monster);
  const monsterLight = new THREE.PointLight(0xff0000,5,15); monster.add(monsterLight);

  camera.position.set(0,1.7,0);
  yaw=0; pitch=0;
  animate();
}

let move={u:0,d:0,l:0,r:0};
['up','down','left','right'].forEach((k,i)=>{
  const btn=document.getElementById(k);
  const key=['u','d','l','r'][i];
  btn.addEventListener('touchstart',e=>{e.preventDefault();move[key]=1});
  btn.addEventListener('touchend',e=>{e.preventDefault();move[key]=0});
  btn.addEventListener('touchcancel',e=>{e.preventDefault();move[key]=0});
});

let isDragging=false, lastX=0, lastY=0;
document.addEventListener('touchstart',e=>{
  if(e.touches.length===1 &&!e.target.classList.contains('btn') && e.target.id!=='restart'){
    isDragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }
});
document.addEventListener('touchmove',e=>{
  if(isDragging){
    const dx=e.touches[0].clientX-lastX; const dy=e.touches[0].clientY-lastY;
    yaw -= dx*0.012; pitch -= dy*0.012;
    pitch = Math.max(-1.5, Math.min(1.5, pitch));
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }
});
document.addEventListener('touchend',()=>{isDragging=false});

document.getElementById('restart').onclick=()=>{initGame()};

function animate(){
  if(gameOver) return;
  requestAnimationFrame(animate);
  const speed=0.14;

  const forward = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const right = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const newPos=camera.position.clone();
  if(move.u) newPos.addScaledVector(forward, speed);
  if(move.d) newPos.addScaledVector(forward, -speed);
  if(move.l) newPos.addScaledVector(right, -speed);
  if(move.r) newPos.addScaledVector(right, speed);

  let collision=false;
  walls.forEach(w=>{if(new THREE.Box3().setFromObject(w).containsPoint(newPos))collision=true;});
  if(!collision)camera.position.copy(newPos);

  // الوحش كيتبعك ولكن بطيء
  const dir = camera.position.clone().sub(monster.position).normalize();
  monster.position.addScaledVector(dir, 0.075);
  monster.lookAt(camera.position);

  // **نظام التنبيه**
  const dist = monster.position.distanceTo(camera.position);
  const warning = document.getElementById('warning');

  if(dist < 12){
    warning.style.display='block';
    if(dist < 6) playBeep(250); // سريع بزاف
    else playBeep(700); // بطيء
  } else {
    warning.style.display='none';
    stopBeep();
  }

  if(dist<2.3){
    document.getElementById('info').innerText='الوحش مسك!!';
    document.getElementById('restart').style.display='block';
    warning.style.display='none';
    stopBeep();
    gameOver=true;
  }

  camera.rotation.set(pitch, yaw, 0, 'YXZ');
  renderer.render(scene,camera);
}

initGame();
</script>
</body>
</html>
