<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>Backrooms Maze</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body{margin:0;overflow:hidden;background:#000;touch-action:none}
#info{position:absolute;top:10px;width:100%;text-align:center;color:#ffdd88;font-family:Arial;font-size:16px;text-shadow:0 0 5px #000}
#warning{display:none;position:absolute;top:30%;width:100%;text-align:center;color:#ff0000;font-size:32px;font-weight:bold;text-shadow:0 0 10px #ff0000;animation:blink 0.3s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.btn{position:absolute;bottom:80px;width:70px;height:70px;font-size:30px;background:rgba(255,200,0,0.15);border:2px solid #ffcc00;border-radius:15px;color:white;touch-action:none}
.btn:active{background:rgba(255,200,0,0.4)}
#up{bottom:160px;left:50%;transform:translateX(-50%)}#down{bottom:80px;left:50%;transform:translateX(-50%)}
#left{bottom:80px;left:15%}#right{bottom:80px;right:15%}
#restart{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px 40px;font-size:24px;background:#ff0000;color:#fff;border:none;border-radius:10px;z-index:10;cursor:pointer}
</style>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
</head>
<body>
<div id="info">توه فالمتاهة... هرب!</div>
<div id="warning">⚠️ الوحش قريب!! ⚠️</div>
<button class="btn" id="up">▲</button><button class="btn" id="left">◀</button>
<button class="btn" id="down">▼</button><button class="btn" id="right">▶</button>
<button id="restart">🔄 إعادة التشغيل</button>

<script type="module">
import * as THREE from 'three';
let scene,camera,renderer,monster,gameOver=false;
let yaw=0,pitch=0;
const walls=[];
let beepInterval = null;

function playBeep(speed){
  if(beepInterval) clearInterval(beepInterval);
  beepInterval = setInterval(()=>{
    const audio = new AudioContext();
    const osc = audio.createOscillator();
    osc.frequency.value = 800;
    osc.connect(audio.destination);
    osc.start(); osc.stop(audio.currentTime + 0.1);
  }, speed);
}
function stopBeep(){ if(beepInterval) clearInterval(beepInterval); beepInterval = null; }

function initGame(){
  document.body.querySelectorAll('canvas').forEach(c=>c.remove());
  stopBeep();
  gameOver=false;
  document.getElementById('restart').style.display='none';
  document.getElementById('warning').style.display='none';
  document.getElementById('info').innerText='توه فالمتاهة... هرب!';

  scene=new THREE.Scene();scene.background=new THREE.Color(0x2a2200);scene.fog=new THREE.Fog(0x2a2200,10,30);
  camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
  renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0x665500,0.8));
  const light=new THREE.PointLight(0xffdd44,3,30);light.position.set(0,4,0);scene.add(light);
  const light2=new THREE.PointLight(0xffdd44,2,20);light2.position.set(10,4,25);scene.add(light2);
  const light3=new THREE.PointLight(0xffdd44,2,20);light3.position.set(-10,4,45);scene.add(light3);

  const floor=new THREE.Mesh(new THREE.PlaneGeometry(200,200),new THREE.MeshStandardMaterial({color:0x5a4f00}));
  floor.rotation.x=-Math.PI/2;scene.add(floor);

  function makeTextTexture(text){
    const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
    canvas.width=1024; canvas.height=256;
    ctx.fillStyle='#4a3f00'; ctx.fillRect(0,0,1024,256);
    ctx.fillStyle='#cc0000'; ctx.font='bold 100px Arial'; ctx.textAlign='center'; ctx.fillText(text,512,150);
    for(let i=0;i<12;i++){ctx.beginPath();ctx.arc(Math.random()*1024,Math.random()*256,Math.random()*20,0,Math.PI*2);ctx.fill();}
    return new THREE.CanvasTexture(canvas);
  }
  const textTex = makeTextTexture('souhail alaoui');
  const textMat = new THREE.MeshStandardMaterial({map: textTex});

  walls.length=0;
  function addWall(x,z,w,h){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,4,h),textMat);
    m.position.set(x,2,z);scene.add(m);walls.push(m);
  }

  // **متاهة كبيرة فيها ممرات بزاف للهروب**
  // الممر الرئيسي
  addWall(0,-10,8,1); addWall(-4,0,1,20); addWall(4,0,1,20);

  // تفرع يمين
  addWall(12,0,8,1); addWall(16,-10,1,20); addWall(16,10,1,20);
  addWall(8,10,8,1); addWall(8,-10,8,1);

  // تفرع يسار
  addWall(-12,0,8,1); addWall(-16,-10,1,20); addWall(-16,10,1,20);
  addWall(-8,10,8,1); addWall(-8,-10,8,1);

  // الممر الثاني
  addWall(0,20,8,1); addWall(-4,30,1,20); addWall(4,30,1,20);

  // تفرع ثاني
  addWall(12,30,8,1); addWall(16,20,1,20); addWall(16,40,1,20);
  addWall(-12,30,8,1); addWall(-16,20,1,20); addWall(-16,40,1,20);

  // النهاية
  addWall(0,50,8,1);

  monster=new THREE.Mesh(
    new THREE.SphereGeometry(1.5,16,16),
    new THREE.MeshStandardMaterial({color:0x110000, emissive:0xff0000, emissiveIntensity:1.5})
  );
  monster.position.set(0,1,25); // بعيد شوية فالمتاهة
  scene.add(monster);
  const monsterLight = new THREE.PointLight(0xff0000,4,12); monster.add(monsterLight);

  camera.position.set(0,1.6,0);
  yaw=0; pitch=0;
  animate();
}

let move={up:0,down:0,left:0,right:0};
['up','down','left','right'].forEach(k=>{
  const btn=document.getElementById(k);
  btn.addEventListener('touchstart',e=>{e.preventDefault();move[k]=1});
  btn.addEventListener('touchend',e=>{e.preventDefault();move[k]=0});
  btn.addEventListener('touchcancel',e=>{e.preventDefault();move[k]=0});
});

let isDragging=false, lastX=0, lastY=0;
document.addEventListener('touchstart',e=>{
  if(e.touches.length===1 &&!e.target.classList.contains('btn') &&e.target.id!=='restart'){
    isDragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }
});
document.addEventListener('touchmove',e=>{
  if(isDragging){
    const dx=e.touches[0].clientX-lastX; const dy=e.touches[0].clientY-lastY;
    yaw -= dx*0.01; pitch -= dy*0.01;
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }
});
document.addEventListener('touchend',()=>{isDragging=false});

document.getElementById('restart').onclick=()=>{initGame()};

function animate(){
  if(gameOver) return;
  requestAnimationFrame(animate);
  const speed=0.13;

  const forward = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const right = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
  const newPos=camera.position.clone();
  if(move.up) newPos.addScaledVector(forward, speed);
  if(move.down) newPos.addScaledVector(forward, -speed);
  if(move.left) newPos.addScaledVector(right, -speed);
  if(move.right) newPos.addScaledVector(right, speed);

  let collision=false; walls.forEach(w=>{if(new THREE.Box3().setFromObject(w).containsPoint(newPos))collision=true;});
  if(!collision)camera.position.copy(newPos);

  const dir = camera.position.clone().sub(monster.position).normalize();
  monster.position.addScaledVector(dir, 0.08);
  monster.lookAt(camera.position);

  const dist = monster.position.distanceTo(camera.position);
  const warning = document.getElementById('warning');

  if(dist < 10){
    warning.style.display='block';
    if(dist < 5) playBeep(300); else playBeep(800);
  } else {
    warning.style.display='none';
    stopBeep();
  }

  if(dist<2.2){
    document.getElementById('info').innerText='الوحش مسك!!';
    document.getElementById('restart').style.display='block';
    warning.style.display='none';
    stopBeep();
    gameOver=true;
  }

  camera.rotation.set(pitch, yaw, 0, 'YXZ');
  renderer.render(scene,camera);
}

initGame();
</script>
</body>
</html>
